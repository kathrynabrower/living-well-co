<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Well Co. - Curated Finds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fdfbf7; }

    .header { 
      padding: 3.5rem 2rem; 
      text-align: center; 
      border-bottom: 1px solid #e5dccf;
      background: linear-gradient(to bottom, #fdfbf7, #f5f0e8);
    }

    .header h1 { 
      font-size: 42px; 
      font-weight: 300; 
      margin-bottom: 8px; 
      color: #2c2c2a;
      letter-spacing: 0.5px;
    }

    .header p { 
      font-size: 16px; 
      color: #888780; 
      font-weight: 300;
      margin-bottom: 1rem;
    }

    .header-subtext {
      font-size: 13px;
      color: #1d9e75;
      font-weight: 500;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }

    .category { margin-bottom: 4rem; }

    .category-title {
      font-size: 26px;
      font-weight: 400;
      margin-bottom: 2rem;
      color: #2c2c2a;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e5dccf;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }

    .card {
      background: white;
      border: 0.5px solid #e5dccf;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .card:hover {
      border-color: #1d9e75;
      box-shadow: 0 8px 20px rgba(29, 158, 117, 0.08);
      transform: translateY(-2px);
    }

    .card-image {
      width: 100%;
      height: 240px;
      background: linear-gradient(135deg, #e8e3d3 0%, #f5f1e8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .savings-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #d85a30;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .card-content {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .card-category {
      font-size: 11px;
      text-transform: uppercase;
      color: #1d9e75;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .card-name {
      font-size: 16px;
      font-weight: 500;
      color: #2c2c2a;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: #5f5e5a;
      line-height: 1.5;
      flex-grow: 1;
      margin-bottom: 1rem;
    }

    .card-price {
      font-size: 13px;
      color: #1d9e75;
      font-weight: 600;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 8px;
      padding: 2.5rem;
      max-width: 600px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 24px;
      color: #888780;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .modal-close:hover { color: #2c2c2a; }

    .modal-image {
      width: 100%;
      height: 320px;
      background: linear-gradient(135deg, #e8e3d3 0%, #f5f1e8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      border-radius: 4px;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .modal-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-category {
      font-size: 11px;
      text-transform: uppercase;
      color: #1d9e75;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .modal-name {
      font-size: 28px;
      font-weight: 400;
      color: #2c2c2a;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .modal-desc {
      font-size: 15px;
      color: #5f5e5a;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .price-section {
      background: #f5f0e8;
      padding: 1.5rem;
      border-radius: 4px;
      margin-bottom: 2rem;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .price-label { color: #888780; }

    .price-original {
      color: #999;
      text-decoration: line-through;
    }

    .price-current {
      font-weight: 600;
      color: #1d9e75;
      font-size: 18px;
    }

    .savings-amount {
      color: #d85a30;
      font-weight: 600;
      font-size: 16px;
    }

    .modal-cta {
      display: inline-block;
      padding: 12px 28px;
      background: #1d9e75;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: 500;
      font-size: 14px;
      transition: background 0.3s;
    }

    .modal-cta:hover {
      background: #0f6e56;
    }

    .loading {
      text-align: center;
      padding: 3rem 2rem;
      color: #888780;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Living Well Co.</h1>
  <p>Curated finds that actually earn their place in your life</p>
  <div class="header-subtext">✓ Tested & loved / ✓ Real savings shown / ✓ Honest recommendations</div>
</div>

<div class="container" id="productsContainer">
  <div class="loading">Loading products...</div>
</div>

<div class="modal" id="modal" onclick="closeModalOnBg(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
async function loadProducts() {
  try {
    const response = await fetch('products.json');
    const data = await response.json();
    renderProducts(data.products);
  } catch (error) {
    console.error('Error loading products:', error);
    document.getElementById('productsContainer').innerHTML = '<div class="loading">Error loading products. Please try refreshing.</div>';
  }
}

function renderProducts(products) {
  const container = document.getElementById('productsContainer');
  container.innerHTML = '';

  const categories = {
    fitness: 'Fitness',
    health: 'Health & Wellness',
    home: 'Home & Living',
    pet: 'Pet Favorites'
  };

  for (const [catKey, catName] of Object.entries(categories)) {
    const catProducts = products.filter(p => p.category === catKey);
    if (catProducts.length === 0) continue;

    const catHTML = document.createElement('div');
    catHTML.className = 'category';
    catHTML.innerHTML = '<div class="category-title">' + catName + '</div><div class="cards-grid" id="grid-' + catKey + '"></div>';
    container.appendChild(catHTML);

    const grid = document.getElementById('grid-' + catKey);
    catProducts.forEach(product => {
      const savings = Math.round(((product.orig - product.curr) / product.orig) * 100);
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openModal(product);
      card.innerHTML = `
        <div class="card-image">
          <div class="savings-badge">Save ${savings}%</div>
          <img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'">
        </div>
        <div class="card-content">
          <div class="card-category">${product.category}</div>
          <div class="card-name">${product.name}</div>
          <div class="card-desc">${product.desc}</div>
          <div class="card-price">Was $${product.orig} → $${product.curr}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }
}

function openModal(product) {
  const savings = Math.round(((product.orig - product.curr) / product.orig) * 100);
  const savingsAmount = product.orig - product.curr;
  
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="modal-image">
      <img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'">
    </div>
    <div class="modal-category">${product.category}</div>
    <div class="modal-name">${product.name}</div>
    <div class="modal-desc">${product.desc}</div>
    <div class="price-section">
      <div class="price-row">
        <span class="price-label">Original price</span>
        <span class="price-original">$${product.orig}</span>
      </div>
      <div class="price-row">
        <span class="price-label">Now</span>
        <span class="price-current">$${product.curr}</span>
      </div>
      <div class="price-row" style="border-top: 1px solid #d3d1c7; padding-top: 8px; margin-top: 8px;">
        <span class="price-label">You save</span>
        <span class="savings-amount">$${savingsAmount} (${savings}%)</span>
      </div>
    </div>
    <a href="${product.link}" class="modal-cta">See it →</a>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal')) {
    closeModal();
  }
}

loadProducts();
</script>

</body>
</html>
